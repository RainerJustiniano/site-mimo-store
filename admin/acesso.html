<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Acesso — Mimo Store</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative;overflow:hidden;background:#0d0008}
.bg{position:fixed;inset:0;z-index:0}
.bg-img{width:100%;height:100%;object-fit:cover;opacity:.18;filter:blur(2px)}
.bg-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(13,0,8,.85) 0%,rgba(80,0,40,.7) 100%)}
.card{position:relative;z-index:1;background:rgba(255,255,255,.97);border-radius:24px;box-shadow:0 8px 40px rgba(190,24,93,.25),0 0 0 1px rgba(236,72,153,.2);padding:2.25rem 2rem;width:100%;max-width:400px}
.logo-wrap{text-align:center;margin-bottom:1.5rem}
.logo-wrap img{height:72px;object-fit:contain}
.logo-wrap .fl{font-size:44px;margin-bottom:.25rem}
.brand{font-family:'Playfair Display',serif;font-size:24px;color:#1a0a12;letter-spacing:-.3px}
.brand span{color:#ec4899}
.tagline{font-size:12px;color:#9d7389;margin-top:4px}
.divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0 1rem}
.divider hr{flex:1;border:none;border-top:1px solid rgba(236,72,153,.15)}
.divider span{font-size:11px;color:#9d7389;font-weight:600;white-space:nowrap}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:11px;font-weight:700;color:#9d7389;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.field input{width:100%;border:1.5px solid rgba(236,72,153,.25);border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;outline:none;transition:all .15s;background:#fff7fb;color:#1a0a12}
.field input:focus{border-color:#ec4899;background:#fff;box-shadow:0 0 0 3px rgba(236,72,153,.1)}
.btn-enter{width:100%;margin-top:1.25rem;background:linear-gradient(135deg,#ec4899,#be185d);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.02em;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-enter:active{opacity:.85;transform:scale(.99)}
.btn-enter.loading{opacity:.7;pointer-events:none}
.error-box{background:#fef2f2;border:1px solid rgba(220,38,38,.3);border-radius:10px;padding:10px 14px;font-size:12px;color:#dc2626;margin-top:.75rem;display:none;text-align:center;font-weight:500}
.hint{text-align:center;margin-top:1rem;font-size:11px;color:#c4a8b8}
.back-link{display:block;text-align:center;margin-top:.75rem;font-size:12px;color:#9d7389;text-decoration:none}
.back-link:hover{color:#ec4899}
/* Roles badge */
.roles{display:flex;gap:8px;justify-content:center;margin-bottom:1.25rem}
.role-chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;border:1.5px solid}
.role-a{background:#fdf2f8;color:#ec4899;border-color:rgba(236,72,153,.3)}
.role-v{background:#f0fdf4;color:#16a34a;border-color:rgba(22,163,74,.3)}
</style>
</head>
<body>
<div class="bg">
  <img class="bg-img" src="/banner.jpg" alt="" onerror="this.style.display='none'">
  <div class="bg-overlay"></div>
</div>

<div class="card">
  <div class="logo-wrap">
    <img src="/logo.png" alt="Mimo Store" onerror="this.style.display='none'">
    <div class="fl" id="fl-emoji">🌸</div>
    <div class="brand">Mimo<span>Store</span> CBA</div>
    <div class="tagline">Painel Interno</div>
  </div>

  <div class="roles">
    <span class="role-chip role-a">⚙️ Admin</span>
    <span class="role-chip role-v">🛍️ Vendedor</span>
  </div>

  <div class="field">
    <label>Usuário</label>
    <input type="text" id="user" placeholder="admin ou vendedor" autocomplete="username" onkeydown="if(event.key==='Enter')entrar()">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
  </div>

  <button class="btn-enter" id="btn" onclick="entrar()">
    <span>Entrar</span>
  </button>

  <div class="error-box" id="err">Usuário ou senha incorretos.</div>

  <div class="hint">Acesso restrito a colaboradores autorizados</div>
  <a class="back-link" href="/">← Voltar ao site</a>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURAÇÃO DE CREDENCIAIS
// Admin: usa o login próprio do admin/index.html
// Vendedor: gerenciado aqui (pode alterar abaixo)
// ══════════════════════════════════════════════
const VEND_KEY = 'msc-vend-creds';
const VEND_SES = 'msc-vend-ses';

function getVendCreds() {
  try {
    const s = localStorage.getItem(VEND_KEY);
    return s ? JSON.parse(s) : { user: 'vendedor', pass: 'mimo@vend2025' };
  } catch { return { user: 'vendedor', pass: 'mimo@vend2025' }; }
}

// Credenciais do admin para verificação no gateway
// (deve ser igual à senha do admin/index.html)
const ADMIN_KEY = 'msc-admin-gw';
function getAdminCreds() {
  try {
    const s = localStorage.getItem(ADMIN_KEY);
    return s ? JSON.parse(s) : { user: 'admin', pass: '' }; // sem pass padrão por segurança
  } catch { return { user: 'admin', pass: '' }; }
}

function entrar() {
  const user = document.getElementById('user').value.trim().toLowerCase();
  const pass = document.getElementById('pass').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  if (!user || !pass) { showErr('Preencha usuário e senha.'); return; }

  btn.classList.add('loading');
  btn.querySelector('span').textContent = 'Verificando...';
  err.style.display = 'none';

  setTimeout(() => {
    // ── Verifica vendedor ──
    const vc = getVendCreds();
    if (user === vc.user && pass === vc.pass) {
      // Define sessão do vendedor e redireciona
      sessionStorage.setItem(VEND_SES, '1');
      window.location.href = '/admin/vendedor/';
      return;
    }

    // ── Verifica admin ──
    // Se as credenciais de admin estão salvas, compara aqui.
    // Se não, permite qualquer usuário "admin" e deixa o
    // admin/index.html fazer a verificação real da senha.
    const ac = getAdminCreds();
    const adminUsers = ['admin', 'rainer', 'ruan']; // adicione usuários admin aqui
    if (adminUsers.includes(user)) {
      if (ac.pass && pass !== ac.pass) {
        btn.classList.remove('loading');
        btn.querySelector('span').textContent = 'Entrar';
        showErr('Senha incorreta para o admin.');
        return;
      }
      // Salva usuário/senha temporariamente para pré-preencher o admin
      sessionStorage.setItem('msc-gw-u', user);
      sessionStorage.setItem('msc-gw-p', pass);
      window.location.href = '/admin/';
      return;
    }

    btn.classList.remove('loading');
    btn.querySelector('span').textContent = 'Entrar';
    showErr('Usuário não reconhecido. Tente: admin ou vendedor.');
  }, 400);
}

function showErr(msg) {
  const err = document.getElementById('err');
  err.textContent = msg;
  err.style.display = 'block';
  document.getElementById('btn').classList.remove('loading');
  document.getElementById('btn').querySelector('span').textContent = 'Entrar';
}

// Auto-foca no campo de usuário
document.getElementById('user').focus();
</script>
</body>
</html>
